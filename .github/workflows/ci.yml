name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go-mainline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: bigclaw-go/go.mod
      - name: Go test
        run: cd bigclaw-go && go test ./...
      - name: Go smoke
        run: bash scripts/ops/bigclawctl dev-smoke --json

  legacy-compatibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Frozen tree audit
        run: bash scripts/ops/bigclawctl legacy-python freeze-audit --json
      - name: Frozen shim compile check
        run: bash scripts/ops/bigclawctl legacy-python compile-check --json
