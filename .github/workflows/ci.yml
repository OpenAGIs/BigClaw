name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Python compile check
        run: python -m compileall src
      - name: Legacy Python smoke
        run: bash scripts/ops/legacy_python_smoke.sh
      - uses: actions/setup-go@v5
        with:
          go-version-file: bigclaw-go/go.mod
      - name: Go CLI test
        working-directory: bigclaw-go
        run: go test ./cmd/bigclawctl
