name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-go@v5
        with:
          go-version-file: bigclaw-go/go.mod
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov ruff
      - name: Verify Go-only migration entrypoints
        run: |
          if git grep -nE 'bigclaw-go/scripts/migration/.+\.py' -- README.md workflow.md .github/workflows .githooks bigclaw-go/README.md; then
            echo "stale deleted Python migration helper references found"
            exit 1
          fi
      - name: Go migration regression
        run: cd bigclaw-go && go test ./cmd/bigclawctl ./internal/regression -run 'TestAutomationMigrationHelpSurface|TestMigrationEntryPointsStayGoOnly'
      - name: Lint
        run: ruff check src tests scripts
      - name: Test
        run: PYTHONPATH=src pytest --cov=bigclaw --cov-report=term-missing --cov-report=xml
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
