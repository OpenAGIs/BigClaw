name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go-mainline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: bigclaw-go/go.mod
      - name: Go test
        working-directory: bigclaw-go
        run: go test ./...

  legacy-python-migration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install legacy migration deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov ruff
      - name: Lint legacy source surface
        run: ruff check src tests scripts
      - name: Test legacy source surface
        run: PYTHONPATH=src pytest --cov=bigclaw --cov-report=term-missing --cov-report=xml
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
