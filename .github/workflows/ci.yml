name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: bigclaw-go/go.mod
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint
        run: ruff check src scripts
      - name: Test
        run: |
          cd bigclaw-go
          go test ./internal/legacyshim ./cmd/bigclawctl
      - name: Legacy Python compile check
        run: bash scripts/ops/bigclawctl legacy-python compile-check --repo . --python python3 --json
      - name: Build package
        run: python -m build
