name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-go@v5
        with:
          go-version-file: bigclaw-go/go.mod
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov ruff
      - name: Verify Go-only migration entrypoints
        run: |
          for legacy_suffix in "_compare.py" "_matrix.py" "_scorecard.py" "_bundle.py"; do
            if git grep -nF "scripts/migration/shadow${legacy_suffix}" -- README.md workflow.md bigclaw-go/README.md || \
              git grep -nF "scripts/migration/live_shadow${legacy_suffix}" -- README.md workflow.md bigclaw-go/README.md || \
              git grep -nF "scripts/migration/export_live_shadow${legacy_suffix}" -- README.md workflow.md bigclaw-go/README.md; then
              echo "stale deleted Python migration helper references found"
              exit 1
            fi
          done
      - name: Go migration regression
        run: cd bigclaw-go && go test ./cmd/bigclawctl ./internal/regression -run 'TestAutomationMigrationHelpSurface|TestMigrationEntryPointsStayGoOnly'
      - name: Lint
        run: ruff check src tests scripts
      - name: Test
        run: PYTHONPATH=src pytest --cov=bigclaw --cov-report=term-missing --cov-report=xml
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
