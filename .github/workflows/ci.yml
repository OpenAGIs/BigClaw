name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: bigclaw-go/go.mod
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Test Go Mainline
        run: cd bigclaw-go && go test ./...
      - name: Verify Legacy Python Shim Compile Check
        run: bash scripts/ops/bigclawctl legacy-python compile-check --json
      - name: Verify Go GitHub Sync Entrypoint
        run: bash scripts/ops/bigclawctl github-sync --help >/dev/null
      - name: Verify Go E2E Automation Entrypoints
        run: |
          cd bigclaw-go
          go run ./cmd/bigclawctl automation e2e run-task-smoke --help >/dev/null
          go run ./cmd/bigclawctl automation e2e export-validation-bundle --help >/dev/null
