name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: bigclaw-go/go.mod
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint
        run: ruff check src scripts bigclaw-go/scripts
      - name: Test
        run: |
          python -m compileall src scripts/create_issues.py scripts/dev_smoke.py bigclaw-go/scripts
          cd bigclaw-go
          go test ./...
      - name: Build package
        run: python -m build
