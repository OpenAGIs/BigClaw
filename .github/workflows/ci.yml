name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: bigclaw-go/go.mod
      - name: Test Root Go Entrypoints
        run: make test
      - name: Build Root Go Entrypoints
        run: make build
      - name: Verify Root Go Operator Entrypoints
        run: |
          bash scripts/ops/bigclawctl github-sync --help >/dev/null
          bash scripts/ops/bigclawctl dev-smoke
